<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative pulse line -->
  <g transform="translate(0,150)" opacity="0.15">
    <path d="M0,0 Q100,-80 200,-60 Q300,-40 400,0 Q500,40 600,30 Q700,20 800,0 Q900,-20 1000,-10 Q1100,-5 1200,0"
          stroke="url(#accent)" fill="none" stroke-width="2"/>
  </g>

  <!-- Bloch sphere mini -->
  <g transform="translate(150,150)" opacity="0.4" stroke="#00d2ff" fill="none" stroke-width="1">
    <ellipse rx="60" ry="60"/>
    <ellipse rx="60" ry="20"/>
    <ellipse rx="20" ry="60"/>
  </g>
  <g filter="url(#glow)">
    <line x1="150" y1="150" x2="185" y2="100" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="185" cy="100" r="4" fill="#00d2ff"/>
  </g>

  <!-- Title -->
  <text x="600" y="130" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" letter-spacing="2">qubit-characterize</text>
  <text x="600" y="170" text-anchor="middle" fill="#a0a0c0" font-family="Helvetica, Arial, sans-serif" font-size="20">Automated superconducting qubit calibration for qulab / quarkstudio</text>

  <!-- Pipeline -->
  <text x="600" y="220" text-anchor="middle" fill="#00d2ff" font-family="monospace" font-size="14" opacity="0.7">S21 &gt; spectrum &gt; rabi &gt; single-shot &gt; ramsey &gt; T1</text>

  <!-- Bottom accent line -->
  <rect x="0" y="294" width="1200" height="6" fill="url(#accent)" opacity="0.8"/>
</svg>
